
<style>
  .container { padding: 1.5rem 0; font-family: var(--font-sans); }
  .label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .prompt-box { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; font-family: var(--font-mono); font-size: 13px; line-height: 1.8; color: var(--color-text-primary); }
  .slot { display: inline-block; border-radius: 4px; padding: 1px 6px; font-weight: 500; cursor: default; }
  .slot-people   { background: #E1F5EE; color: #085041; }
  .slot-suitcase { background: #E6F1FB; color: #0C447C; }
  .slot-outfit   { background: #F1EFE8; color: #444441; }
  .slot-setting  { background: #FAEEDA; color: #633806; }
  .slot-floor    { background: #FBEAF0; color: #72243E; }
  .slot-bg       { background: #EEEDFE; color: #3C3489; }
  .slot-lighting { background: #EAF3DE; color: #27500A; }
  .slot-shot     { background: #FAECE7; color: #712B13; }
  .slot-angle    { background: #FCEBEB; color: #791F1F; }
  .slot-comp     { background: #FAEEDA; color: #854F0B; }
  .slot-dof      { background: #E1F5EE; color: #0F6E56; }
  .slot-accent   { background: #FBEAF0; color: #993556; }
  .slot-narrative{ background: #EEEDFE; color: #534AB7; }
  .controls { display: flex; align-items: center; gap: 12px; margin-top: 1.25rem; }
  .btn { font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
  .btn:hover { background: var(--color-background-secondary); }
  .btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
  .btn-primary:hover { opacity: 0.85; }
  .counter { font-size: 12px; color: var(--color-text-secondary); margin-left: auto; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 1rem; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
  .mode-toggle { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .mode-btn { font-size: 11px; padding: 4px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .mode-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: transparent; }
  .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; vertical-align: middle; margin-right: 3px; border: 0.5px solid var(--color-border-tertiary); }
</style>

<div class="container">
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('template')">Template</button>
    <button class="mode-btn" onclick="setMode('filled')">Filled examples</button>
  </div>

  <div class="label" id="box-label">Prompt template</div>
  <div class="prompt-box" id="prompt-box"></div>

  <div class="controls">
    <button class="btn" id="btn-prev" onclick="prev()" style="display:none">← Prev</button>
    <button class="btn btn-primary" id="btn-next" onclick="next()">Show example →</button>
    <span class="counter" id="counter"></span>
  </div>

  <div class="legend" id="legend"></div>
</div>

<script>
const SLOTS = {
  people:    { label: "people_presence",  cls: "slot-people",   values: ["shown in a partial body shot from the waist down", "standing in a full body shot", "with no person present — product only"] },
  suitcase:  { label: "suitcase_color",   cls: "slot-suitcase", values: ["#1A1A1A", "#2B3A55", "#4A8BBA", "#7A8B7A", "#C4A484", "#C9A7A7", "#D8B4B9", "#EBB63B"] },
  outfit:    { label: "outfit_color",     cls: "slot-outfit",   values: ["#1A1A1A", "#2B2B2B", "#8C8C8C", "#B0B0B0", "#C0C0C0", "#E8E8E8", "#FFFFFF"] },
  setting:   { label: "setting",          cls: "slot-setting",  values: ["an outdoor urban plaza", "an outdoor travel location", "a minimal indoor home interior", "an indoor retail space", "a clean indoor workspace"] },
  floor:     { label: "floor_color",      cls: "slot-floor",    values: ["#1A1A1A", "#8C8279", "#8C8C8C", "#B0B0B0", "#C0C0C0", "#E8E8E8"] },
  bg:        { label: "background_color", cls: "slot-bg",       values: ["#B0B8C3", "#BDB7A7", "#BDBDBD", "#D2C4B7", "#D9C9B8", "#E8D8C8", "#FFFFFF"] },
  lighting:  { label: "lighting",         cls: "slot-lighting", values: ["soft diffused natural daylight", "direct harsh natural sunlight with defined shadows", "soft controlled studio lighting"] },
  shot:      { label: "shot_size",        cls: "slot-shot",     values: ["medium shot", "medium wide shot", "medium close-up shot"] },
  angle:     { label: "camera_angle",     cls: "slot-angle",    values: ["shot at eye level", "shot from a low angle looking up"] },
  comp:      { label: "composition",      cls: "slot-comp",     values: ["centered composition", "rule-of-thirds composition"] },
  dof:       { label: "depth_of_field",   cls: "slot-dof",      values: ["shallow depth of field with a softly blurred background", "moderate depth of field", "deep depth of field with a sharp background"] },
  accent:    { label: "accent_color",     cls: "slot-accent",   values: ["#1A1A1A", "#4A4E5A", "#A63D3D", "#A67C52", "#D94126"] },
  narrative: { label: "narrative_style",  cls: "slot-narrative",values: ["staged editorial campaign photography", "documentary candid photography"] },
};

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function isHex(s) { return /^#[0-9A-Fa-f]{6}$/.test(s); }

function swatchHtml(val, cls) {
  if (!isHex(val)) return `<span class="slot ${cls}">${val}</span>`;
  return `<span class="slot ${cls}"><span class="swatch" style="background:${val}"></span>${val}</span>`;
}

function buildPrompt(filled) {
  const v = filled || {};
  function slot(key) {
    const s = SLOTS[key];
    if (!filled) return `<span class="slot ${s.cls}">{${s.label.toUpperCase()}}</span>`;
    return swatchHtml(v[key], s.cls);
  }
  return `Editorial lifestyle campaign photo for a premium luggage brand. A person ${slot('people')}, pulling a premium Horizn Studios hard-shell suitcase in ${slot('suitcase')}, wearing a muted monochromatic outfit in ${slot('outfit')}, set in ${slot('setting')} with floor surfaces in ${slot('floor')} and background in ${slot('bg')}. ${slot('lighting')}, ${slot('shot')}, ${slot('angle')}, ${slot('comp')}, ${slot('dof')}. Accent details in ${slot('accent')} on hardware and zippers. Premium, refined, and timeless mood, ${slot('narrative')}.`;
}

function randomFill() {
  const v = {};
  Object.keys(SLOTS).forEach(k => v[k] = pick(SLOTS[k].values));
  return v;
}

function buildLegend() {
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = Object.values(SLOTS).map(s =>
    `<div class="legend-item"><div class="legend-dot slot ${s.cls}" style="border-radius:2px;width:8px;height:8px;display:inline-block;"></div>${s.label}</div>`
  ).join('');
}

let mode = 'template';
let examples = [];
let idx = -1;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(m === 'template' ? 'template' : 'filled')));
  if (m === 'template') {
    examples = []; idx = -1;
    render();
  } else {
    idx = -1;
    next();
  }
}

function render() {
  const box = document.getElementById('prompt-box');
  const label = document.getElementById('box-label');
  const btnNext = document.getElementById('btn-next');
  const btnPrev = document.getElementById('btn-prev');
  const counter = document.getElementById('counter');

  if (mode === 'template') {
    box.innerHTML = buildPrompt(null);
    label.textContent = 'Prompt template';
    btnNext.textContent = 'Show example →';
    btnPrev.style.display = 'none';
    counter.textContent = '';
  } else {
    box.innerHTML = buildPrompt(examples[idx]);
    label.textContent = `Example ${idx + 1} of ${examples.length}`;
    btnNext.textContent = idx < examples.length - 1 ? 'Next example →' : '+ Generate new';
    btnPrev.style.display = idx > 0 ? 'inline-block' : 'none';
    counter.textContent = `${examples.length} generated`;
  }
}

function next() {
  if (mode === 'template') { setMode('filled'); return; }
  if (idx < examples.length - 1) { idx++; }
  else { examples.push(randomFill()); idx = examples.length - 1; }
  render();
}

function prev() {
  if (idx > 0) { idx--; render(); }
}

buildLegend();
render();
</script>
